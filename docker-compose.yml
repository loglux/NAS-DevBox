services:
  devbox:
    build:
      context: .
      args:
        DEVBOX_USER: ${DEVBOX_USER:-dev}
        DEVBOX_PASS: ${DEVBOX_PASS:-changeme}
        DEVBOX_UID: ${DEVBOX_UID:-1000}
        DEVBOX_GID: ${DEVBOX_GID:-1000}
        DOCKER_GID: ${DOCKER_GID:-1000}
    container_name: ${DEVBOX_CONTAINER_NAME:-devbox}
    hostname: ${DEVBOX_USER:-dev}

    volumes:
      - ${DEVBOX_PROJECTS_DIR:-/volume1/projects}:/projects
      - ${DEVBOX_HOME_DIR:-/volume1/projects/.devbox-home}:/home/${DEVBOX_USER:-dev}
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "${DEVBOX_SSH_PORT:-2202}:22"

    restart: always

  devbox-playwright:

    profiles: ["playwright"]
    build:
      context: .
      args:
        DEVBOX_USER: ${DEVBOX_USER:-dev}
        DEVBOX_PASS: ${DEVBOX_PASS:-changeme}
        DEVBOX_UID: ${DEVBOX_UID:-1000}
        DEVBOX_GID: ${DEVBOX_GID:-1000}
        DOCKER_GID: ${DOCKER_GID:-1000}
        PLAYWRIGHT_TOOLS: "true"
    container_name: ${DEVBOX_PLAYWRIGHT_CONTAINER_NAME:-devbox-playwright}
    hostname: ${DEVBOX_USER:-dev}-playwright

    volumes:
      - ${DEVBOX_PROJECTS_DIR:-/volume1/projects}:/projects
      - ${DEVBOX_HOME_DIR:-/volume1/projects/.devbox-home}:/home/${DEVBOX_USER:-dev}
      - /var/run/docker.sock:/var/run/docker.sock

    ports:
      - "${DEVBOX_PLAYWRIGHT_SSH_PORT:-2203}:22"
      - "${DEVBOX_PLAYWRIGHT_CDP_PORT:-9223}:9223"

    security_opt:
      - seccomp:unconfined
    cap_add:
      - SYS_ADMIN
    ipc: host

    restart: always

    command: >
      bash -c "start-cdp.sh; exec /usr/sbin/sshd -D"
